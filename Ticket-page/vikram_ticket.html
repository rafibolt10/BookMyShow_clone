<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket</title>
    <link rel="stylesheet" href="./ticket-animate.css">
</head>
<body>



<div class="ticket-wrapper">

    <img src="./confetti-29.gif" class="confetti" alt="confetti">
    <img src="./confetti.gif" class="confetti2" alt="confetti">
    <div class="ticket-container">

    <div class="ticket">

        <div class="ticket-header">
            <h2>book<span>my</span>show</h2>
        </div>

        <div class="movie-details">

            <img src="../Movie Images/vikram.webp" alt="Movie Poster">

            <div class="info">
                <p class="format">U/A, 2D, Tamil</p>
                <h3>Vikram</h3>
                <p>Rohini Silver Screens: Koyambedu</p>
                <p>Thu, 12 jun | 11:25 PM</p>
            </div>

            <div class="side-text">
                M-TICKET
            </div>

        </div>

        <div class="cut left1"></div>
        <div class="cut right1"></div>

        <div class="seat-details">

            <div>
                <span>SCREEN</span>
                <h3>Elite 1</h3>
            </div>

            <div>
                <span>SEATS</span>
                <h3>A - A1, A2</h3>
            </div>

        </div>

        <div class="cut left2"></div>
        <div class="cut right2"></div>

        <div class="qr-section">
            <div class="qrcode"></div>
            <p>W64WA4</p>
        </div>

    <p class="note">
        This transaction can be cancelled up to 20 mins before the show.
    </p>
</div>

</div>

</body>
</html>
