<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow</title>
    <link rel="stylesheet" href="./topbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- The Top Logo bar and buttons -->
    <div class="toplogopanel">
        <div class="logo">
            <img src="./bookmyshow-logo.png" height="50px">
        </div>
        <div class="searchbar">
            <i class="fa-brands fa-sistrix"></i>
            <input type="text" id="searchbar" name="searchbar" placeholder="Search for Movies,Events, Plays, Sports and Activities">
        </div>
        <div class="locations">

            <select id="locations" name="locations">
                <option value="trichy">Trichy</option>
                <option value="Banglore">Banglore</option>
            </select>
        </div>
        <div class="signin">
            Sign In
        </div>
        <div class="side"><i class="fa-solid fa-bars"></i></div>
    </div>

     <!-- The Second menus on top bar list and hyperlinks menus -->

     <div class="secondtopmenu">
        <div class="movies">movies</div>
        <div class="stream">stream</div>
        <div class="events">events</div>
        <div class="plays">plays</div>
        <div class="sport">sport</div>
        <div class="activities">activities</div>
        <div class="listyourshow">listyourshow</div>
        <div class="offers">offers</div>
        <div class="gift cards">giftcards</div>
     </div>
</body>
</html>
